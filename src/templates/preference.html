<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Onboarding Step 3: Work Preference</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Plus_Jakarta_Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary-fixed-dim": "#b4c1ff",
                        "background": "#f9f5ff",
                        "on-primary-container": "#00146f",
                        "error-container": "#f74b6d",
                        "on-surface": "#2d2a51",
                        "error": "#b41340",
                        "on-primary-fixed": "#000000",
                        "inverse-on-surface": "#9c98c6",
                        "tertiary-fixed": "#dee5fd",
                        "primary-dim": "#3646a5",
                        "surface-bright": "#f9f5ff",
                        "on-surface-variant": "#5a5781",
                        "on-tertiary-fixed": "#394154",
                        "surface-dim": "#d4cfff",
                        "surface-container-low": "#f3eeff",
                        "on-secondary-fixed": "#1f2f6e",
                        "on-secondary-fixed-variant": "#3d4c8d",
                        "on-primary": "#f3f1ff",
                        "surface-variant": "#ddd9ff",
                        "secondary-dim": "#3c4b8c",
                        "on-tertiary-fixed-variant": "#565d71",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#8999fd",
                        "on-secondary": "#f2f1ff",
                        "tertiary-dim": "#484f63",
                        "primary": "#4353b2",
                        "surface": "#f9f5ff",
                        "on-tertiary-container": "#4c5367",
                        "on-primary-fixed-variant": "#071d81",
                        "outline": "#75729e",
                        "surface-container-highest": "#ddd9ff",
                        "on-background": "#2d2a51",
                        "surface-container": "#e9e5ff",
                        "primary-fixed-dim": "#7c8cef",
                        "tertiary-fixed-dim": "#d0d7ee",
                        "secondary-container": "#c7cfff",
                        "secondary": "#485798",
                        "surface-container-high": "#e3dfff",
                        "tertiary": "#545b6f",
                        "primary-container": "#8999fd",
                        "on-tertiary": "#f0f2ff",
                        "on-error-container": "#510017",
                        "on-error": "#ffefef",
                        "surface-tint": "#4353b2",
                        "inverse-surface": "#0b082f",
                        "inverse-primary": "#8999fd",
                        "outline-variant": "#aca8d7",
                        "on-secondary-container": "#344383",
                        "error-dim": "#a70138",
                        "secondary-fixed": "#c7cfff",
                        "tertiary-container": "#dee5fd"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Plus Jakarta Sans"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .tonal-shift-bg {
            background: linear-gradient(135deg, #f9f5ff 0%, #f3eeff 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px);
        }

        .ambient-glow {
            box-shadow: 0 10px 30px rgba(45, 42, 81, 0.06);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background text-on-surface font-body min-h-screen flex flex-col items-center">
    <!-- TopAppBar -->
    <header
        class="fixed top-0 w-full z-50 bg-[#f9f5ff] dark:bg-[#1a1a2e] flex justify-between items-center px-6 py-4 w-full max-w-md mx-auto tonal-shift-bg">
        <div class="flex items-center gap-4">
            <button
                class="text-[#5a5781] dark:text-[#aca8d7] hover:bg-[#e9e5ff] dark:hover:bg-[#2d2a51] rounded-full transition-all p-2 active:scale-95 duration-200">
                <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
            </button>
            <h1 class="font-['Manrope'] font-bold tracking-tight text-xl text-[#2d2a51] dark:text-[#e9e5ff]">Onboarding
            </h1>
        </div>
        <div class="flex items-center">
            <span class="font-label text-sm font-semibold text-on-surface-variant">Step 3 of 5</span>
        </div>
    </header>
    <!-- Main Content Area -->
    <main class="flex-1 w-full max-w-md px-6 pt-24 pb-32 flex flex-col">
        <!-- Progress Bar -->
        <div class="w-full bg-surface-container-highest h-[0.7rem] rounded-full mb-12">
            <div class="h-full bg-gradient-to-r from-primary to-inverse-primary rounded-full transition-all duration-500"
                style="width: 60%;"></div>
        </div>
        <!-- Editorial Header Section -->
        <section class="mb-10">
            <h2 class="font-headline text-[2.75rem] leading-[1.1] font-extrabold tracking-tight text-on-surface mb-4">
                How do you prefer to start your work?
            </h2>
            <p class="font-body text-lg text-on-surface-variant leading-relaxed">
                We'll suggest tasks based on your energy levels.
            </p>
        </section>
        <!-- Preference Cards Container -->
        <div class="space-y-4">
            <!-- Hard Tasks Card (Active/Selected State Example) -->
            <label class="relative block cursor-pointer group">
                <input checked="" class="peer sr-only" name="preference" type="radio" />
                <div
                    class="p-8 rounded-lg surface-container-lowest border border-outline-variant/20 ambient-glow transition-all duration-300 peer-checked:ring-2 peer-checked:ring-primary peer-checked:bg-surface-container-lowest peer-checked:border-primary/20">
                    <div class="flex items-start gap-5">
                        <div
                            class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container shrink-0 transition-transform group-active:scale-95">
                            <span class="material-symbols-outlined" data-icon="bolt"
                                style="font-variation-settings: 'FILL' 1;">bolt</span>
                        </div>
                        <div>
                            <h3 class="font-headline text-xl font-bold text-on-surface mb-2">Start with hard tasks</h3>
                            <p class="font-body text-on-surface-variant text-sm leading-relaxed">
                                Tackle your biggest challenges while your focus is highest.
                            </p>
                        </div>
                    </div>
                </div>
            </label>
            <!-- Easy Tasks Card -->
            <label class="relative block cursor-pointer group">
                <input class="peer sr-only" name="preference" type="radio" />
                <div
                    class="p-8 rounded-lg bg-surface-container-low border border-outline-variant/10 ambient-glow transition-all duration-300 peer-checked:ring-2 peer-checked:ring-primary peer-checked:bg-surface-container-lowest peer-checked:border-primary/20 hover:bg-surface-container">
                    <div class="flex items-start gap-5">
                        <div
                            class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface-variant shrink-0 transition-transform group-active:scale-95">
                            <span class="material-symbols-outlined" data-icon="rocket_launch">rocket_launch</span>
                        </div>
                        <div>
                            <h3 class="font-headline text-xl font-bold text-on-surface mb-2">Start with easy tasks</h3>
                            <p class="font-body text-on-surface-variant text-sm leading-relaxed">
                                Build momentum with quick wins to get your day moving.
                            </p>
                        </div>
                    </div>
                </div>
            </label>
        </div>
        <!-- Decorative Element -->
        <div class="mt-12 flex-1 flex items-end justify-center opacity-40">
            <div class="w-24 h-1 bg-surface-container-highest rounded-full"></div>
        </div>
    </main>
    <!-- BottomNavBar -->
    <footer class="fixed bottom-0 w-full z-50 pb-8 px-6 bg-transparent">
        <div class="flex justify-between items-center w-full max-w-md mx-auto">
            <!-- Back Button -->
            <button
                class="text-[#5a5781] dark:text-[#aca8d7] font-['Plus_Jakarta_Sans'] font-medium px-6 py-4 hover:opacity-90 transition-opacity active:scale-98 transition-transform duration-200 flex items-center gap-2">
                <span class="material-symbols-outlined text-sm" data-icon="chevron_left">chevron_left</span>
                Back
            </button>
            <!-- Next Button -->
            <button
                class="bg-gradient-to-br from-[#4353b2] to-[#8999fd] text-white font-['Plus_Jakarta_Sans'] font-semibold text-sm rounded-full px-10 py-4 shadow-lg shadow-[#2d2a51]/10 hover:opacity-90 transition-opacity active:scale-98 transition-transform duration-200 flex items-center gap-2">
                Next
                <span class="material-symbols-outlined text-sm" data-icon="chevron_right">chevron_right</span>
            </button>
        </div>
    </footer>
    <!-- Abstract Background Texture -->
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div class="absolute -top-[10%] -left-[10%] w-[50%] h-[50%] bg-primary-container/10 blur-[120px] rounded-full">
        </div>
        <div
            class="absolute -bottom-[10%] -right-[10%] w-[50%] h-[50%] bg-secondary-container/10 blur-[120px] rounded-full">
        </div>
    </div>
</body>

</html>
