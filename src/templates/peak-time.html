<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary": "#4edea3",
              "primary": "#ddb7ff",
              "surface-container-high": "#2a2a2a",
              "inverse-primary": "#842bd2",
              "tertiary-container": "#00a572",
              "secondary-container": "#03b5d3",
              "on-secondary-fixed": "#001f26",
              "surface": "#131313",
              "on-tertiary": "#003824",
              "on-error": "#690005",
              "on-primary-fixed": "#2c0051",
              "on-error-container": "#ffdad6",
              "outline": "#988d9f",
              "secondary-fixed": "#acedff",
              "surface-variant": "#353534",
              "on-tertiary-fixed-variant": "#005236",
              "on-primary": "#490080",
              "tertiary-fixed": "#6ffbbe",
              "inverse-on-surface": "#313030",
              "surface-bright": "#393939",
              "on-secondary-container": "#00424e",
              "secondary": "#4cd7f6",
              "error": "#ffb4ab",
              "on-background": "#e5e2e1",
              "surface-tint": "#ddb7ff",
              "tertiary-fixed-dim": "#4edea3",
              "surface-dim": "#131313",
              "on-primary-container": "#400071",
              "inverse-surface": "#e5e2e1",
              "primary-fixed-dim": "#ddb7ff",
              "on-tertiary-container": "#00311f",
              "on-secondary": "#003640",
              "surface-container-lowest": "#0e0e0e",
              "secondary-fixed-dim": "#4cd7f6",
              "on-primary-fixed-variant": "#6900b3",
              "surface-container-low": "#1c1b1b",
              "error-container": "#93000a",
              "on-surface-variant": "#cfc2d6",
              "outline-variant": "#4d4354",
              "on-secondary-fixed-variant": "#004e5c",
              "primary-fixed": "#f0dbff",
              "background": "#131313",
              "surface-container": "#201f1f",
              "on-tertiary-fixed": "#002113",
              "on-surface": "#e5e2e1"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(53, 53, 52, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(77, 67, 84, 0.2);
        }
        .active-glass-card {
            background: rgba(3, 181, 211, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid #4cd7f6;
            box-shadow: 0px 0px 15px rgba(221, 183, 255, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col">
<!-- TopAppBar Navigation Shell -->
<header class="bg-[#131313] docked full-width top-0 z-50 flex justify-between items-center w-full px-6 py-4 shadow-[0px_0px_15px_rgba(168,85,247,0.1)]">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-purple-500">signal_cellular_alt</span>
<span class="text-xl font-bold text-purple-500 tracking-widest font-space-grotesk tracking-tighter uppercase">NEON_PROTOCOL</span>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-slate-500 hover:text-purple-400 transition-colors duration-100 cursor-pointer">settings</span>
</div>
<div class="absolute bottom-0 left-0 bg-gradient-to-r from-transparent via-purple-500/20 to-transparent h-[1px] w-full"></div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 py-12 max-w-md mx-auto w-full">
<!-- Progress Indicator -->
<div class="w-full mb-12">
<div class="flex justify-between items-end mb-2">
<span class="font-headline text-[10px] uppercase tracking-[0.2em] text-secondary">Phase_02</span>
<span class="font-headline text-[10px] uppercase tracking-[0.2em] text-outline">40% COMPLETE</span>
</div>
<div class="h-[2px] w-full bg-surface-container-highest relative overflow-hidden">
<div class="absolute left-0 top-0 h-full bg-secondary shadow-[0_0_10px_#4cd7f6]" style="width: 40%"></div>
</div>
</div>
<!-- Question Header -->
<div class="w-full mb-10">
<h1 class="font-headline text-3xl font-bold tracking-tight text-on-surface leading-tight mb-2">
                When are you most <span class="text-primary">productive?</span>
</h1>
<p class="text-outline text-sm font-body">Identify your peak performance window for protocol optimization.</p>
</div>
<!-- Selection Grid -->
<div class="w-full space-y-4">
<!-- Option: Morning -->
<div class="glass-card flex items-center p-5 cursor-pointer group hover:bg-surface-container-high transition-all duration-200 rounded-xl border-l-4 border-l-transparent">
<div class="w-12 h-12 flex items-center justify-center bg-surface-container-lowest rounded-lg mr-4 border border-outline-variant/20">
<span class="material-symbols-outlined text-secondary group-hover:scale-110 transition-transform">light_mode</span>
</div>
<div class="flex-grow">
<h3 class="font-headline text-sm font-bold tracking-wide uppercase text-on-surface">Morning</h3>
<p class="text-[10px] text-outline uppercase tracking-wider">06:00 — 12:00</p>
</div>
<div class="w-4 h-4 rounded-full border border-outline-variant flex items-center justify-center">
<div class="w-2 h-2 rounded-full bg-transparent"></div>
</div>
</div>
<!-- Option: Afternoon (Selected State Example) -->
<div class="active-glass-card flex items-center p-5 cursor-pointer transition-all duration-200 rounded-xl border-l-4 border-l-secondary">
<div class="w-12 h-12 flex items-center justify-center bg-secondary-container/20 rounded-lg mr-4 border border-secondary/30 shadow-[0_0_15px_rgba(76,215,246,0.2)]">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">wb_sunny</span>
</div>
<div class="flex-grow">
<h3 class="font-headline text-sm font-bold tracking-wide uppercase text-secondary">Afternoon</h3>
<p class="text-[10px] text-secondary/70 uppercase tracking-wider">12:00 — 18:00</p>
</div>
<div class="w-4 h-4 rounded-full border border-secondary flex items-center justify-center">
<div class="w-2 h-2 rounded-full bg-secondary"></div>
</div>
</div>
<!-- Option: Night -->
<div class="glass-card flex items-center p-5 cursor-pointer group hover:bg-surface-container-high transition-all duration-200 rounded-xl border-l-4 border-l-transparent">
<div class="w-12 h-12 flex items-center justify-center bg-surface-container-lowest rounded-lg mr-4 border border-outline-variant/20">
<span class="material-symbols-outlined text-tertiary group-hover:scale-110 transition-transform">bedtime</span>
</div>
<div class="flex-grow">
<h3 class="font-headline text-sm font-bold tracking-wide uppercase text-on-surface">Night</h3>
<p class="text-[10px] text-outline uppercase tracking-wider">18:00 — 02:00</p>
</div>
<div class="w-4 h-4 rounded-full border border-outline-variant flex items-center justify-center">
<div class="w-2 h-2 rounded-full bg-transparent"></div>
</div>
</div>
</div>
<!-- Telemetry Data Visualization (Asymmetric HUD detail) -->
<div class="w-full mt-10 p-4 bg-surface-container-lowest/50 border-r-2 border-primary/20 rounded-sm">
<div class="flex items-center gap-3">
<div class="animate-pulse w-2 h-2 rounded-full bg-tertiary"></div>
<span class="font-label text-[9px] uppercase tracking-[0.2em] text-outline">Syncing user circadian rhythm...</span>
</div>
</div>
</main>
<!-- BottomNavBar Navigation Shell -->
<footer class="fixed bottom-0 left-0 w-full flex justify-between items-center px-6 py-6 gap-4 bg-[#131313]/80 backdrop-blur-xl z-50 border-t border-purple-500/10 shadow-2xl">
<!-- Back Button (Inactive Style) -->
<button class="flex flex-col items-center justify-center text-cyan-400 border border-cyan-400/30 px-8 py-3 flex-1 font-inter text-[10px] uppercase tracking-[0.1em] font-bold hover:bg-cyan-500/10 hover:shadow-[0_0_10px_rgba(34,211,238,0.3)] transition-all active:scale-95">
<span class="material-symbols-outlined mb-1">chevron_left</span>
            PREVIOUS
        </button>
<!-- Continue Button (Active Style) -->
<button class="flex flex-col items-center justify-center bg-purple-500 text-white rounded-none px-8 py-3 flex-1 font-inter text-[10px] uppercase tracking-[0.1em] font-bold shadow-[0_0_20px_rgba(168,85,247,0.4)] active:scale-95 transition-all">
<span class="material-symbols-outlined mb-1">chevron_right</span>
            CONTINUE
        </button>
</footer>
</body></html>
