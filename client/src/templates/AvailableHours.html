</div>
</div>

<div class="w-full text-center mb-10">
<h2 class="font-headline text-3xl font-bold tracking-tight mb-2 uppercase">How many hours can you dedicate?</h2>
<p class="text-on-surface-variant text-sm font-label uppercase tracking-widest opacity-70">Define mission parameters for synchronization</p>
</div>

<div class="relative w-64 h-64 flex items-center justify-center mb-12">

<div class="absolute inset-0 border border-primary/10 rounded-full neon-halo"></div>
<div class="absolute inset-4 border border-secondary/5 rounded-full"></div>

<div class="z-10 flex flex-col items-center">

</span>

</div>
</div>
